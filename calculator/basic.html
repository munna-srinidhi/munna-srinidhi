<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neon Glass Calculator</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    background:
    linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.7)),
    url('https://images.unsplash.com/photo-1516321318423-f06f85e504b3?q=80&w=2000');
    background-size:cover;
    background-position:center;
    position:relative;
}

body::before{
    content:'';
    position:absolute;
    width:450px;
    height:450px;
    background:#00ffff30;
    border-radius:50%;
    top:-120px;
    left:-120px;
    filter:blur(100px);
    animation:moveGlow1 10s infinite alternate;
}

body::after{
    content:'';
    position:absolute;
    width:400px;
    height:400px;
    background:#ff00ff30;
    border-radius:50%;
    bottom:-120px;
    right:-120px;
    filter:blur(100px);
    animation:moveGlow2 10s infinite alternate;
}

@keyframes moveGlow1{
    100%{
        transform:translate(200px,150px);
    }
}

@keyframes moveGlow2{
    100%{
        transform:translate(-200px,-150px);
    }
}

.calculator{
    position:relative;
    width:380px;
    padding:25px;
    border-radius:35px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(18px);
    border:1px solid rgba(255,255,255,0.15);
    box-shadow:
    0 8px 32px rgba(0,0,0,0.4),
    0 0 30px rgba(0,255,255,0.15);
    animation:fadeIn 1s ease;
}

.title{
    text-align:center;
    margin-bottom:20px;
    color:white;
    font-size:1.7rem;
    font-weight:600;
    letter-spacing:1px;
}

.display{
    width:100%;
    height:90px;
    border:none;
    outline:none;
    border-radius:20px;
    padding:20px;
    font-size:2rem;
    text-align:right;
    margin-bottom:25px;
    background:rgba(255,255,255,0.1);
    color:white;
    box-shadow:inset 0 0 12px rgba(255,255,255,0.1);
}
.buttons{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:15px;
}

button{
    height:70px;
    border:none;
    border-radius:18px;
    font-size:1.3rem;
    font-weight:600;
    cursor:pointer;
    color:white;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(5px);
    transition:0.3s;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

button:hover{
    transform:translateY(-5px) scale(1.05);
    box-shadow:
    0 0 20px rgba(255,255,255,0.25),
    0 0 30px rgba(0,255,255,0.2);
}


button:active{
    transform:scale(0.95);
}

.operator{
    background:linear-gradient(45deg,#00c6ff,#0072ff);
}

.equal{
    background:linear-gradient(45deg,#ff00cc,#3333ff);
    grid-column:span 2;
}

.clear{
    background:linear-gradient(45deg,#ff512f,#dd2476);
}

.delete{
    background:linear-gradient(45deg,#f7971e,#ffd200);
    color:black;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(30px) scale(0.9);
    }
    to{
        opacity:1;
        transform:translateY(0) scale(1);
    }
}


@media(max-width:450px){

    .calculator{
        width:95%;
        padding:20px;
    }

    button{
        height:60px;
        font-size:1.1rem;
    }

    .display{
        height:75px;
        font-size:1.6rem;
    }

    .title{
        font-size:1.4rem;
    }
}

</style>
</head>

<body>

<div class="calculator">

    <div class="title">✨ Neon Calculator</div>

    <!-- DISPLAY -->

    <input type="text" id="display" class="display" readonly>

    <!-- BUTTONS -->

    <div class="buttons">

        <button class="clear" onclick="clearDisplay()">AC</button>
        <button class="delete" onclick="deleteLast()">DEL</button>
        <button class="operator" onclick="appendValue('%')">%</button>
        <button class="operator" onclick="appendValue('/')">÷</button>

        <button onclick="appendValue('7')">7</button>
        <button onclick="appendValue('8')">8</button>
        <button onclick="appendValue('9')">9</button>
        <button class="operator" onclick="appendValue('*')">×</button>

        <button onclick="appendValue('4')">4</button>
        <button onclick="appendValue('5')">5</button>
        <button onclick="appendValue('6')">6</button>
        <button class="operator" onclick="appendValue('-')">−</button>

        <button onclick="appendValue('1')">1</button>
        <button onclick="appendValue('2')">2</button>
        <button onclick="appendValue('3')">3</button>
        <button class="operator" onclick="appendValue('+')">+</button>

        <button onclick="appendValue('0')">0</button>
        <button onclick="appendValue('.')">.</button>

        <button class="equal" onclick="calculate()">=</button>

    </div>

</div>

<script>

const display = document.getElementById("display");


function appendValue(value){

    display.value += value;

}


function clearDisplay(){

    display.value = "";

}


function deleteLast(){

    display.value = display.value.slice(0,-1);

}

function calculate(){

    try{

        display.value = eval(display.value);

    }
    catch{

        display.value = "Error";

    }

}


document.addEventListener("keydown",(event)=>{

    const key = event.key;

    if(
        (key >= '0' && key <= '9') ||
        key === '+' ||
        key === '-' ||
        key === '*' ||
        key === '/' ||
        key === '.' ||
        key === '%'
    ){

        appendValue(key);

    }

    else if(key === 'Enter'){

        calculate();

    }

    

    else if(key === 'Backspace'){

        deleteLast();

    }

    

    else if(key === 'Escape'){

        clearDisplay();

    }

});

</script>

</body>
</html>
