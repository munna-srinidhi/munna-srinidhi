<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Telugu Music Player</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>

/* =========================
   GLOBAL STYLES
========================= */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    position:relative;

    background:
    linear-gradient(rgba(0,0,0,0.65),rgba(0,0,0,0.75)),
    url('https://images.unsplash.com/photo-1493225457124-a3eb161ffa5f?q=80&w=2000');

    background-size:cover;
    background-position:center;
}

body::before{
    content:'';
    position:absolute;
    width:450px;
    height:450px;
    background:#00ffff30;
    border-radius:50%;
    top:-120px;
    left:-120px;
    filter:blur(100px);
    animation:glow1 8s infinite alternate;
}

body::after{
    content:'';
    position:absolute;
    width:400px;
    height:400px;
    background:#ff00ff25;
    border-radius:50%;
    bottom:-120px;
    right:-120px;
    filter:blur(100px);
    animation:glow2 8s infinite alternate;
}

@keyframes glow1{
    100%{
        transform:translate(180px,150px);
    }
}

@keyframes glow2{
    100%{
        transform:translate(-180px,-150px);
    }
}

/* =========================
   PLAYER CONTAINER
========================= */

.player{
    width:390px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(18px);
    border-radius:35px;
    padding:25px;

    box-shadow:
    0 8px 32px rgba(0,0,0,0.4),
    0 0 30px rgba(0,255,255,0.15);

    z-index:2;

    animation:fadeIn 1s ease;
}

/* =========================
   ALBUM IMAGE
========================= */

.album-art{
    width:100%;
    height:300px;
    overflow:hidden;
    border-radius:25px;
    margin-bottom:20px;
}

.album-art img{
    width:100%;
    height:100%;
    object-fit:cover;

    animation:rotate 18s linear infinite;
    animation-play-state:paused;
}

.player.playing .album-art img{
    animation-play-state:running;
}

@keyframes rotate{
    from{
        transform:rotate(0deg);
    }
    to{
        transform:rotate(360deg);
    }
}

/* =========================
   SONG INFO
========================= */

.song-info{
    text-align:center;
    color:white;
}

.song-info h2{
    font-size:1.6rem;
    margin-bottom:5px;
}

.song-info p{
    color:#ddd;
    margin-bottom:20px;
}

/* =========================
   PROGRESS BAR
========================= */

.progress-container{
    width:100%;
    height:8px;
    background:rgba(255,255,255,0.15);
    border-radius:10px;
    cursor:pointer;
    overflow:hidden;
}

.progress{
    width:0%;
    height:100%;
    border-radius:10px;
    background:linear-gradient(45deg,#00dbde,#fc00ff);
}

.time{
    display:flex;
    justify-content:space-between;
    margin-top:8px;
    color:#ddd;
    font-size:0.9rem;
}

/* =========================
   CONTROLS
========================= */

.controls{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:20px;
    margin-top:25px;
}

.controls button{
    width:60px;
    height:60px;
    border:none;
    border-radius:50%;
    cursor:pointer;
    color:white;
    font-size:1.2rem;

    background:rgba(255,255,255,0.08);

    transition:0.3s;
}

.controls button:hover{
    transform:scale(1.1);
    box-shadow:0 0 20px rgba(255,255,255,0.2);
}

.play-btn{
    width:75px !important;
    height:75px !important;

    background:
    linear-gradient(45deg,#00dbde,#fc00ff) !important;
}

/* =========================
   VOLUME
========================= */

.volume{
    margin-top:25px;
    color:white;
}

.volume label{
    display:block;
    margin-bottom:10px;
}

#volume{
    width:100%;
}

/* =========================
   PLAYLIST
========================= */

.playlist{
    margin-top:30px;
}

.playlist h3{
    color:white;
    margin-bottom:15px;
}

.song{
    padding:14px;
    border-radius:15px;
    margin-bottom:12px;
    cursor:pointer;

    background:rgba(255,255,255,0.08);

    color:white;

    transition:0.3s;
}

.song:hover{
    background:
    linear-gradient(45deg,#00dbde,#fc00ff);

    transform:translateX(5px);
}

/* =========================
   ANIMATION
========================= */

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(30px) scale(0.9);
    }
    to{
        opacity:1;
        transform:translateY(0) scale(1);
    }
}

/* =========================
   RESPONSIVE
========================= */

@media(max-width:450px){

    .player{
        width:95%;
        padding:20px;
    }

    .album-art{
        height:250px;
    }

    .controls button{
        width:50px;
        height:50px;
    }

    .play-btn{
        width:65px !important;
        height:65px !important;
    }
}

</style>
</head>

<body>

<div class="player" id="player">

    <!-- Album Art -->

    <div class="album-art">

        <img id="cover"
        src="https://images.unsplash.com/photo-1493225457124-a3eb161ffa5f?q=80&w=1200">

    </div>

    <!-- Song Info -->

    <div class="song-info">

        <h2 id="title">Samajavaragamana</h2>

        <p id="artist">Sid Sriram</p>

    </div>

    <!-- Progress -->

    <div class="progress-container"
    id="progress-container">

        <div class="progress"
        id="progress"></div>

    </div>

    <div class="time">

        <span id="current-time">0:00</span>

        <span id="duration">0:00</span>

    </div>

    <!-- Controls -->

    <div class="controls">

        <button id="prev">
            <i class="fas fa-backward"></i>
        </button>

        <button class="play-btn" id="play">
            <i class="fas fa-play"></i>
        </button>

        <button id="next">
            <i class="fas fa-forward"></i>
        </button>

    </div>

    <!-- Volume -->

    <div class="volume">

        <label>🔊 Volume</label>

        <input type="range"
        id="volume"
        min="0"
        max="1"
        step="0.01"
        value="1">

    </div>

    <!-- Playlist -->

    <div class="playlist">

        <h3>🎵 Telugu Playlist</h3>

        <div class="song" onclick="loadSong(0)">
            🎶 Samajavaragamana — Sid Sriram
        </div>

        <div class="song" onclick="loadSong(1)">
            🎶 Butta Bomma — Armaan Malik
        </div>

        <div class="song" onclick="loadSong(2)">
            🎶 Inkem Inkem Inkem Kaavaale — Sid Sriram
        </div>

        <div class="song" onclick="loadSong(3)">
            🎶 Ramulo Ramula — Anurag Kulkarni
        </div>

        <div class="song" onclick="loadSong(4)">
            🎶 Srivalli — Javed Ali
        </div>

    </div>

</div>

<!-- AUDIO -->

<audio id="audio"></audio>

<script>

/* =========================
   SONG LIST
========================= */

const songs = [

{
    title:"Samajavaragamana",
    artist:"Sid Sriram",

    src:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3",

    cover:"https://images.unsplash.com/photo-1493225457124-a3eb161ffa5f?q=80&w=1200"
},

{
    title:"Butta Bomma",
    artist:"Armaan Malik",

    src:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3",

    cover:"https://images.unsplash.com/photo-1511379938547-c1f69419868d?q=80&w=1200"
},

{
    title:"Inkem Inkem Inkem Kaavaale",
    artist:"Sid Sriram",

    src:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3",

    cover:"https://images.unsplash.com/photo-1501612780327-45045538702b?q=80&w=1200"
},

{
    title:"Ramulo Ramula",
    artist:"Anurag Kulkarni",

    src:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-4.mp3",

    cover:"https://images.unsplash.com/photo-1516280440614-37939bbacd81?q=80&w=1200"
},

{
    title:"Srivalli",
    artist:"Javed Ali",

    src:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-5.mp3",

    cover:"https://images.unsplash.com/photo-1514320291840-2e0a9bf2a9ae?q=80&w=1200"
}

];

/* =========================
   ELEMENTS
========================= */

const audio = document.getElementById("audio");

const playBtn = document.getElementById("play");

const prevBtn = document.getElementById("prev");

const nextBtn = document.getElementById("next");

const title = document.getElementById("title");

const artist = document.getElementById("artist");

const cover = document.getElementById("cover");

const progress = document.getElementById("progress");

const progressContainer =
document.getElementById("progress-container");

const currentTime =
document.getElementById("current-time");

const duration =
document.getElementById("duration");

const volume =
document.getElementById("volume");

const player =
document.getElementById("player");

let songIndex = 0;

/* =========================
   LOAD SONG
========================= */

function loadSong(index){

    songIndex = index;

    title.innerText = songs[index].title;

    artist.innerText = songs[index].artist;

    audio.src = songs[index].src;

    cover.src = songs[index].cover;

    playSong();
}

/* =========================
   PLAY SONG
========================= */

function playSong(){

    player.classList.add("playing");

    audio.play();

    playBtn.innerHTML =
    '<i class="fas fa-pause"></i>';
}

/* =========================
   PAUSE SONG
========================= */

function pauseSong(){

    player.classList.remove("playing");

    audio.pause();

    playBtn.innerHTML =
    '<i class="fas fa-play"></i>';
}

/* =========================
   PLAY / PAUSE
========================= */

playBtn.addEventListener("click",()=>{

    const isPlaying =
    player.classList.contains("playing");

    if(isPlaying){

        pauseSong();

    }else{

        playSong();
    }
});

/* =========================
   NEXT SONG
========================= */

function nextSong(){

    songIndex++;

    if(songIndex > songs.length - 1){

        songIndex = 0;
    }

    loadSong(songIndex);
}

/* =========================
   PREVIOUS SONG
========================= */

function prevSong(){

    songIndex--;

    if(songIndex < 0){

        songIndex = songs.length - 1;
    }

    loadSong(songIndex);
}

nextBtn.addEventListener("click",nextSong);

prevBtn.addEventListener("click",prevSong);

/* =========================
   UPDATE PROGRESS
========================= */

audio.addEventListener("timeupdate",(e)=>{

    const {duration:dur,currentTime:cur}
    = e.srcElement;

    const progressPercent =
    (cur / dur) * 100;

    progress.style.width =
    `${progressPercent}%`;

    

    const durationMinutes =
    Math.floor(dur / 60);

    let durationSeconds =
    Math.floor(dur % 60);

    if(durationSeconds < 10){

        durationSeconds =
        `0${durationSeconds}`;
    }

    if(durationSeconds){

        duration.innerText =
        `${durationMinutes}:${durationSeconds}`;
    }

    /* Current Time */

    const currentMinutes =
    Math.floor(cur / 60);

    let currentSeconds =
    Math.floor(cur % 60);

    if(currentSeconds < 10){

        currentSeconds =
        `0${currentSeconds}`;
    }

    currentTime.innerText =
    `${currentMinutes}:${currentSeconds}`;
});

/* =========================
   SET PROGRESS
========================= */

progressContainer.addEventListener("click",(e)=>{

    const width =
    progressContainer.clientWidth;

    const clickX = e.offsetX;

    const dur = audio.duration;

    audio.currentTime =
    (clickX / width) * dur;
});

/* =========================
   AUTOPLAY
========================= */

audio.addEventListener("ended",nextSong);

/* =========================
   VOLUME CONTROL
========================= */

volume.addEventListener("input",(e)=>{

    audio.volume = e.target.value;
});

/* =========================
   INITIAL SONG
========================= */

loadSong(songIndex);

</script>

</body>
</html>
