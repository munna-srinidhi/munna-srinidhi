<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Neon Music Player</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<!-- Font Awesome -->
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

/* =========================
   GLOBAL
========================= */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:
    linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.7)),
    url('https://images.unsplash.com/photo-1493225457124-a3eb161ffa5f?q=80&w=2000');
    background-size:cover;
    background-position:center;
    overflow:hidden;
    position:relative;
}

body::before{
    content:'';
    position:absolute;
    width:450px;
    height:450px;
    background:#00ffff25;
    border-radius:50%;
    top:-120px;
    left:-120px;
    filter:blur(100px);
    animation:glow1 8s infinite alternate;
}

body::after{
    content:'';
    position:absolute;
    width:400px;
    height:400px;
    background:#ff00ff20;
    border-radius:50%;
    bottom:-120px;
    right:-100px;
    filter:blur(100px);
    animation:glow2 8s infinite alternate;
}

@keyframes glow1{
    100%{
        transform:translate(180px,150px);
    }
}

@keyframes glow2{
    100%{
        transform:translate(-180px,-150px);
    }
}

/* =========================
   PLAYER CONTAINER
========================= */

.player{
    width:380px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(18px);
    border-radius:35px;
    padding:25px;
    box-shadow:
    0 8px 32px rgba(0,0,0,0.4),
    0 0 30px rgba(0,255,255,0.15);
    position:relative;
    z-index:2;
    animation:fadeIn 1s ease;
}


.album-art{
    width:100%;
    height:300px;
    border-radius:25px;
    overflow:hidden;
    margin-bottom:20px;
    position:relative;
}

.album-art img{
    width:100%;
    height:100%;
    object-fit:cover;
    animation:rotate 20s linear infinite;
    animation-play-state:paused;
}

.player.playing .album-art img{
    animation-play-state:running;
}

@keyframes rotate{
    from{
        transform:rotate(0deg);
    }
    to{
        transform:rotate(360deg);
    }
}

.song-info{
    text-align:center;
    color:white;
    margin-bottom:20px;
}

.song-info h2{
    font-size:1.5rem;
    margin-bottom:5px;
}

.song-info p{
    color:#cbd5e1;
}


.progress-container{
    width:100%;
    height:8px;
    background:rgba(255,255,255,0.15);
    border-radius:10px;
    cursor:pointer;
    margin:20px 0 10px;
}

.progress{
    width:0%;
    height:100%;
    border-radius:10px;
    background:linear-gradient(45deg,#00dbde,#fc00ff);
}


.time{
    display:flex;
    justify-content:space-between;
    color:#ddd;
    font-size:0.9rem;
}

.controls{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:20px;
    margin-top:25px;
}

.controls button{
    width:60px;
    height:60px;
    border:none;
    border-radius:50%;
    cursor:pointer;
    font-size:1.2rem;
    color:white;
    transition:0.3s;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(10px);
}

.controls button:hover{
    transform:scale(1.1);
    box-shadow:0 0 20px rgba(255,255,255,0.2);
}

.play-btn{
    width:75px !important;
    height:75px !important;
    background:linear-gradient(45deg,#00dbde,#fc00ff) !important;
}

.volume-container{
    margin-top:25px;
    color:white;
}

.volume-container label{
    display:block;
    margin-bottom:10px;
}

#volume{
    width:100%;
}


.playlist{
    margin-top:30px;
}

.playlist h3{
    color:white;
    margin-bottom:15px;
}

.playlist-item{
    padding:12px;
    border-radius:12px;
    margin-bottom:10px;
    background:rgba(255,255,255,0.08);
    color:white;
    cursor:pointer;
    transition:0.3s;
}

.playlist-item:hover{
    background:linear-gradient(45deg,#00dbde,#fc00ff);
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(30px) scale(0.9);
    }
    to{
        opacity:1;
        transform:translateY(0) scale(1);
    }
}

@media(max-width:450px){

    .player{
        width:95%;
    }

    .album-art{
        height:250px;
    }

    .controls button{
        width:50px;
        height:50px;
    }

    .play-btn{
        width:65px !important;
        height:65px !important;
    }
}

</style>
</head>

<body>

<div class="player" id="player">

    <!-- Album Art -->

    <div class="album-art">
        <img id="cover"
        src="https://images.unsplash.com/photo-1493225457124-a3eb161ffa5f?q=80&w=1200">
    </div>

    <!-- Song Info -->

    <div class="song-info">
        <h2 id="title">Dream Music</h2>
        <p id="artist">Unknown Artist</p>
    </div>

    <!-- Progress Bar -->

    <div class="progress-container" id="progress-container">

        <div class="progress" id="progress"></div>

    </div>

    <div class="time">
        <span id="current-time">0:00</span>
        <span id="duration">0:00</span>
    </div>

    <!-- Controls -->

    <div class="controls">

        <button id="prev">
            <i class="fas fa-backward"></i>
        </button>

        <button class="play-btn" id="play">
            <i class="fas fa-play"></i>
        </button>

        <button id="next">
            <i class="fas fa-forward"></i>
        </button>

    </div>

    <!-- Volume -->

    <div class="volume-container">

        <label>🔊 Volume</label>

        <input type="range"
        id="volume"
        min="0"
        max="1"
        step="0.01"
        value="1">

    </div>

    <!-- Playlist -->

    <div class="playlist">

        <h3>🎵 Playlist</h3>

        <div class="playlist-item" onclick="loadSong(0)">
            Dream Music - Artist One
        </div>

        <div class="playlist-item" onclick="loadSong(1)">
            Night Vibes - Artist Two
        </div>

        <div class="playlist-item" onclick="loadSong(2)">
            Chill Beats - Artist Three
        </div>

    </div>

</div>

<!-- AUDIO -->

<audio id="audio"></audio>

<script>


const songs = [

{
    title:"Dream Music",
    artist:"Artist One",
    src:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3",
    cover:"https://images.unsplash.com/photo-1493225457124-a3eb161ffa5f?q=80&w=1200"
},

{
    title:"Night Vibes",
    artist:"Artist Two",
    src:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3",
    cover:"https://images.unsplash.com/photo-1511379938547-c1f69419868d?q=80&w=1200"
},

{
    title:"Chill Beats",
    artist:"Artist Three",
    src:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3",
    cover:"https://images.unsplash.com/photo-1501612780327-45045538702b?q=80&w=1200"
}

];


const audio = document.getElementById("audio");
const playBtn = document.getElementById("play");
const prevBtn = document.getElementById("prev");
const nextBtn = document.getElementById("next");

const title = document.getElementById("title");
const artist = document.getElementById("artist");
const cover = document.getElementById("cover");

const progress = document.getElementById("progress");
const progressContainer = document.getElementById("progress-container");

const currentTimeEl = document.getElementById("current-time");
const durationEl = document.getElementById("duration");

const volume = document.getElementById("volume");

const player = document.getElementById("player");

let songIndex = 0;


function loadSong(index){

    songIndex = index;

    title.innerText = songs[index].title;
    artist.innerText = songs[index].artist;

    audio.src = songs[index].src;
    cover.src = songs[index].cover;

    playSong();

}

function playSong(){

    player.classList.add("playing");

    audio.play();

    playBtn.innerHTML =
    '<i class="fas fa-pause"></i>';

}

function pauseSong(){

    player.classList.remove("playing");

    audio.pause();

    playBtn.innerHTML =
    '<i class="fas fa-play"></i>';

}

playBtn.addEventListener("click",()=>{

    const isPlaying =
    player.classList.contains("playing");

    if(isPlaying){

        pauseSong();

    }
    else{

        playSong();

    }

});


function nextSong(){

    songIndex++;

    if(songIndex > songs.length - 1){

        songIndex = 0;

    }

    loadSong(songIndex);

}

function prevSong(){

    songIndex--;

    if(songIndex < 0){

        songIndex = songs.length - 1;

    }

    loadSong(songIndex);

}

nextBtn.addEventListener("click",nextSong);
prevBtn.addEventListener("click",prevSong);


audio.addEventListener("timeupdate",(e)=>{

    const {duration,currentTime} = e.srcElement;

    const progressPercent =
    (currentTime / duration) * 100;

    progress.style.width =
    `${progressPercent}%`;


    const durationMinutes =
    Math.floor(duration / 60);

    let durationSeconds =
    Math.floor(duration % 60);

    if(durationSeconds < 10){

        durationSeconds = `0${durationSeconds}`;

    }

    if(durationSeconds){

        durationEl.innerText =
        `${durationMinutes}:${durationSeconds}`;

    }

    const currentMinutes =
    Math.floor(currentTime / 60);

    let currentSeconds =
    Math.floor(currentTime % 60);

    if(currentSeconds < 10){

        currentSeconds = `0${currentSeconds}`;

    }

    currentTimeEl.innerText =
    `${currentMinutes}:${currentSeconds}`;

});

progressContainer.addEventListener("click",(e)=>{

    const width = progressContainer.clientWidth;

    const clickX = e.offsetX;

    const duration = audio.duration;

    audio.currentTime =
    (clickX / width) * duration;

});

audio.addEventListener("ended",nextSong);


volume.addEventListener("input",(e)=>{

    audio.volume = e.target.value;

});


loadSong(songIndex);

</script>

</body>
</html>
